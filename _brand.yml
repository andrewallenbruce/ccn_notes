meta:
  name: CCNs
  links:
    home: https://andrewallenbruce.github.io/ccn_notes/
    github: https://github.com/andrewallenbruce/ccn_notes

color:
  palette:
    orange: "#F96302"
    white: "#FFFFFF"
    black: "#000000"
    warmgraylight: "#F5F5F5"
    warmgraydark: "#747474"
    warmgraymedium: "#C4C4C4"
  foreground: black
  background: white
  primary: warmgraylight
  secondary: warmgraydark
  light: warmgraylight
  dark: warmgraydark

typography:
  fonts:
    - family: Roboto Slab
      source: google
      weight: [300, 400, 600, 700]
    - family: JetBrains Mono
      source: google
      weight: [400, 600]
    - family: Atkinson Hyperlegible Next
      source: google
      weight: [400, 600, 700]
  base:
    family: Roboto Slab
    line-height: 1.5
    size: 0.9em
  headings:
    family: Atkinson Hyperlegible Next
    weight: 600
  monospace:
    family: JetBrains Mono
    # size: 0.9em
    weight: 400

