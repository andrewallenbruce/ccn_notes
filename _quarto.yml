project:
  type: book
  output-dir: docs

execute: 
  eval: true
  echo: true
  warning: false

book:
  title: "CCNs"
  subtitle: "CMS Certification Numbers"
  author: "Andrew Allen Bruce"
  date: "03/31/2026"
  back-to-top-navigation: true
  page-navigation: true
  page-footer: "© Copyright 2026 Andrew Allen Bruce."
  site-url: https://andrewallenbruce.github.io/ccn_notes/
  repo-url: https://github.com/andrewallenbruce/ccn_notes
  
  chapters:
    - index.qmd
    - state.qmd
    - part: medicare.qmd
      chapters:
        - opo.qmd
        - emergency.qmd
        - hha.qmd
        - esrd.qmd
        - ltch.qmd
        - rhc.qmd
        - irf.qmd
        - cah.qmd
        - snf.qmd
    - part: eipps.qmd
      chapters:
        - unit.qmd
        - subunit.qmd
        - swing.qmd
    - part: supplier.qmd
      chapters:
        - asc.qmd
        - clia.qmd
        - pxrf.qmd
    - part: medicaid.qmd
      chapters:
        - moh.qmd
        - nf.qmd
        - icf-iid.qmd
  appendices:
    - vctrs.qmd
    - resources.qmd

format:
  html:
    anchor-sections: true
    backgroundcolor: "#FFFFFF"
    code-fold: false
    code-link: true
    code-overflow: scroll
    code-tools: true
    code-copy: true
    date: last-modified
    default-image-extension: png
    embed-resources: false
    fig-cap-location: margin
    fig-width: 5
    fig-asp: 0.67
    fig-align: center
    fig-dpi: 300
    fig-format: png
    footnotes-hover: true
    fontcolor: "#43464b"
    grid:
      body-width: 1000px
    linkcolor: "darkred"
    number-sections: false
    reference-location: document
    smooth-scroll: true
    syntax-highlighting: tango
    toc: true
    toc-depth: 2
    toc-title: "Contents"
    urlcolor: "#FC4C02"
